<!DOCTYPE html>
<html>
<head>
    <title>CollabSpace - Section Wise Real-Time Communication</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #e5e7eb; 
            height: 100vh; 
            overflow: hidden;
        }
        .container { height: 100vh; display: flex; flex-direction: column; }
        
        /* Navigation Bar */
        .navbar { 
            background: rgba(15, 23, 42, 0.95); 
            backdrop-filter: blur(25px); 
            padding: 18px 35px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo { 
            font-size: 1.9em; 
            font-weight: 800; 
            background: linear-gradient(45deg, #3b82f6, #8b5cf6, #06b6d4); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
        }
        .nav-controls { display: flex; gap: 12px; align-items: center; }
        .status-indicator { 
            width: 12px; height: 12px; 
            background: #10b981; 
            border-radius: 50%; 
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        /* Section Containers */
        .section { 
            flex: 1; 
            display: flex; 
            position: relative; 
            background: rgba(255,255,255,0.03);
        }
        .section-title { 
            position: absolute; 
            top: 20px; 
            left: 30px; 
            font-size: 1.4em; 
            font-weight: 700; 
            background: linear-gradient(45deg, #3b82f6, #8b5cf6); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            z-index: 10;
        }
        
        /* =============================================================================
           SECTION 1: AUTHENTICATION & ROOM SYSTEM
           User login + secure meeting rooms
           ============================================================================= */
        #section1 { justify-content: center; align-items: center; }
        .auth-container { 
            background: rgba(255,255,255,0.1); 
            backdrop-filter: blur(20px); 
            padding: 50px 60px; 
            border-radius: 25px; 
            border: 1px solid rgba(255,255,255,0.2);
            text-align: center; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .auth-input { 
            width: 350px; 
            padding: 18px 25px; 
            margin: 15px 0; 
            border: 2px solid rgba(255,255,255,0.3); 
            border-radius: 15px; 
            background: rgba(255,255,255,0.1); 
            color: white; 
            font-size: 16px; 
            text-align: center;
        }
        .auth-input::placeholder { color: rgba(255,255,255,0.7); }
        .room-input-container { margin: 25px 0; }
        .btn { 
            padding: 15px 35px; 
            border: none; 
            border-radius: 15px; 
            cursor: pointer; 
            font-weight: 700; 
            font-size: 16px; 
            transition: all 0.3s; 
            backdrop-filter: blur(10px);
        }
        .btn-primary { background: linear-gradient(45deg, #3b82f6, #8b5cf6); color: white; }
        .btn-success { background: linear-gradient(45deg, #10b981, #059669); color: white; }
        .btn-danger { background: linear-gradient(45deg, #ef4444, #dc2626); color: white; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        
        /* =============================================================================
           SECTION 2: VIDEO CONFERENCING GRID
           Multi-user WebRTC video streams
           ============================================================================= */
        #section2 { display: none; }
        .video-layout { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 15px; 
            padding: 30px; 
            height: 100%; 
            overflow: auto;
        }
        .video-container { 
            background: rgba(0,0,0,0.6); 
            border-radius: 20px; 
            overflow: hidden; 
            position: relative; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            transition: all 0.3s;
        }
        .video-container:hover { transform: scale(1.02); }
        .video-player { 
            width: 100%; 
            height: 220px; 
            object-fit: cover; 
            background: #1a1a2e;
        }
        .video-overlay { 
            position: absolute; 
            bottom: 15px; 
            left: 15px; 
            right: 15px; 
            background: rgba(0,0,0,0.8); 
            padding: 10px 15px; 
            border-radius: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        .video-user { font-weight: 600; font-size: 14px; }
        .video-status { font-size: 12px; color: #10b981; }
        
        /* =============================================================================
           SECTION 3: MEDIA CONTROLS & SCREEN SHARING
           Real-time audio/video/screen controls
           ============================================================================= */
        #section3 { display: none; padding: 25px; gap: 20px; align-items: center; }
        .control-group { display: flex; gap: 12px; }
        .control-btn { 
            width: 55px; height: 55px; 
            border-radius: 50%; 
            border: none; 
            cursor: pointer; 
            font-size: 20px; 
            transition: all 0.3s;
        }
        .control-btn.active { box-shadow: 0 0 0 3px rgba(16,185,129,0.5); transform: scale(1.1); }
        .control-btn.video { background: linear-gradient(45deg, #3b82f6, #1e40af); color: white; }
        .control-btn.audio { background: linear-gradient(45deg, #10b981, #059669); color: white; }
        .control-btn.screen { background: linear-gradient(45deg, #f59e0b, #d97706); color: white; }
        
        /* =============================================================================
           SECTION 4: COLLABORATION TOOLS
           Whiteboard + file sharing
           ============================================================================= */
        #section4 { display: none; flex-direction: column; padding: 30px; gap: 25px; }
        .tools-panel { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
        .tool-btn { 
            width: 60px; height: 60px; 
            border-radius: 50%; 
            border: 2px solid rgba(255,255,255,0.3); 
            background: rgba(255,255,255,0.1); 
            cursor: pointer; 
            font-size: 24px; 
            transition: all 0.3s;
        }
        .tool-btn:hover, .tool-btn.active { background: rgba(59,130,246,0.3); border-color: #3b82f6; transform: scale(1.15); }
        #whiteboardCanvas { 
            width: 100%; 
            height: 400px; 
            border-radius: 20px; 
            border: 2px solid rgba(255,255,255,0.3); 
            background: white; 
            cursor: crosshair;
        }
        .file-list { 
            background: rgba(255,255,255,0.1); 
            border-radius: 15px; 
            padding: 20px; 
            max-height: 200px; 
            overflow-y: auto;
        }
        .file-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 12px 15px; 
            background: rgba(255,255,255,0.1); 
            margin: 8px 0; 
            border-radius: 10px;
        }
        
        /* =============================================================================
           SECTION 5: CHAT & NOTIFICATIONS
           Real-time messaging + alerts
           ============================================================================= */
        #section5 { display: none; flex-direction: column; padding: 30px; gap: 20px; }
        .chat-container { flex: 1; display: flex; flex-direction: column; background: rgba(255,255,255,0.05); border-radius: 20px; overflow: hidden; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; }
        .message { 
            margin-bottom: 15px; 
            display: flex; 
            gap: 12px;
        }
        .message.own { flex-direction: row-reverse; }
        .message-bubble { 
            max-width: 70%; 
            padding: 12px 18px; 
            border-radius: 20px; 
            backdrop-filter: blur(10px);
        }
        .message.own .message-bubble { background: rgba(59,130,246,0.8); }
        .message.other .message-bubble { background: rgba(255,255,255,0.2); }
        .chat-input-container { 
            padding: 20px; 
            border-top: 1px solid rgba(255,255,255,0.1); 
            display: flex; 
            gap: 15px;
        }
        .chat-input { 
            flex: 1; 
            padding: 15px 20px; 
            border: 2px solid rgba(255,255,255,0.3); 
            border-radius: 25px; 
            background: rgba(255,255,255,0.1); 
            color: white;
        }
        .notifications-panel { 
            background: rgba(255,255,255,0.05); 
            border-radius: 15px; 
            padding: 20px; 
            max-height: 150px; 
            overflow-y: auto;
        }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        
        <!-- =============================================================================
             SECTION 1: SECURE AUTH & ROOM CREATION
             User authentication + meeting room system
             ============================================================================= -->
        <div class="navbar">
            <div class="logo"> CollabSpace Pro</div>
            <div class="nav-controls">
                <div class="status-indicator" id="connectionStatus"></div>
                <span id="roomInfo"></span>
                <span id="userInfo"></span>
            </div>
        </div>

        <div class="section" id="section1">
            <div class="auth-container">
                <h1 style="font-size:3.2em; margin-bottom:25px; background: linear-gradient(45deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                    Real-Time Collaboration
                </h1>
                <div style="margin-bottom:30px;">
                    <input class="auth-input" type="text" id="usernameInput" placeholder="Enter your name">
                </div>
                <div class="room-input-container">
                    <input class="auth-input" type="text" id="roomCodeInput" placeholder="Room Code (optional)">
                    <button class="btn btn-primary" onclick="createMeeting()">🚀 Create Meeting</button>
                    <button class="btn btn-success" onclick="joinMeeting()">🚪 Join Meeting</button>
                </div>
                <div id="qrCode" style="margin-top:25px;"></div>
            </div>
        </div>

        <!-- =============================================================================
             SECTION 2: MULTI-USER VIDEO GRID
             WebRTC peer-to-peer video conferencing
             ============================================================================= -->
        <div class="section hidden" id="section2">
            <div class="section-title"> Live Video Conference</div>
            <div class="video-layout" id="videoContainer">
                <!-- Dynamic video streams -->
            </div>
        </div>

        <!-- =============================================================================
             SECTION 3: MEDIA CONTROLS & SCREEN SHARING
             Complete A/V + screen sharing controls
             ============================================================================= -->
        <div class="section hidden" id="section3">
            <div class="section-title"> Media Controls</div>
            <div class="control-group">
                <button class="control-btn video active" id="videoToggle" title="Toggle Video"></button>
                <button class="control-btn audio active" id="audioToggle" title="Toggle Audio"></button>
                <button class="control-btn screen" id="screenToggle" title="Share Screen"></button>
                <button class="control-btn" id="muteAll" title="Mute Everyone"></button>
            </div>
            <div style="margin-left:auto; display:flex; gap:15px;">
                <div style="padding:15px 25px; background:rgba(255,255,255,0.1); border-radius:15px;">
                    📊 Participants: <span id="participantCount">1</span>
                </div>
                <button class="btn btn-danger" onclick="endMeeting()">End Meeting</button>
            </div>
        </div>

        <!-- =============================================================================
             SECTION 4: COLLABORATION TOOLS
             Whiteboard + file sharing + annotations
             ============================================================================= -->
        <div class="section hidden" id="section4">
            <div class="section-title"> Collaboration Tools</div>
            <div class="tools-panel">
                <button class="tool-btn active" onclick="activateTool('whiteboard')" title="Whiteboard">🎨</button>
                <button class="tool-btn" onclick="activateTool('files')" title="File Sharing">📎</button>
                <button class="tool-btn" onclick="activateTool('notes')" title="Sticky Notes">📝</button>
                <input type="file" id="fileUpload" style="display:none;" multiple onchange="uploadFiles(event)">
            </div>
            <canvas id="whiteboardCanvas" class="hidden"></canvas>
            <div id="filesPanel" class="file-list hidden"></div>
        </div>

        <!-- =============================================================================
             SECTION 5: REAL-TIME CHAT & NOTIFICATIONS
             Live messaging + system notifications
             ============================================================================= -->
        <div class="section hidden" id="section5">
            <div class="section-title"> Communication Center</div>
            <div class="chat-container">
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-container">
                    <input class="chat-input" id="messageInput" placeholder="Type a message... (Enter to send)" onkeypress="handleEnter(event)">
                    <button class="btn btn-primary" onclick="sendMessage()">Send</button>
                </div>
            </div>
            <div class="notifications-panel">
                <div style="font-weight:600; margin-bottom:15px;"> Notifications</div>
                <div id="notificationsList"></div>
            </div>
        </div>
    </div>

<script>
/* =============================================================================
   COLLABSPACE - COMPLETE REAL-TIME COMMUNICATION PLATFORM
   WebRTC Video + Whiteboard + File Share + Chat + Encryption Simulation
   ============================================================================= */

class CollabSpace {
    constructor() {
        this.peers = new Map();
        this.localStream = null;
        this.participants = new Set();
        this.currentRoom = null;
        this.userId = null;
        this.userName = '';
        this.mediaState = { video: true, audio: true, screen: false };
        this.activeTool = 'whiteboard';
        this.files = [];
        this.messages = [];
        this.notifications = [];
        this.init();
    }
    
    // SECTION 1: INITIALIZATION & ROOM SYSTEM
    init() {
        this.setupWebRTC();
        this.setupWhiteboard();
        this.setupEventListeners();
        this.updateUI();
    }
    
    setupWebRTC() {
        // WebRTC Peer Connection Configuration
        window.RTCPeerConnection = window.RTCPeerConnection || window.webkitRTCPeerConnection;
        
        // Signaling via localStorage broadcast channel simulation
        window.addEventListener('storage', (e) => {
            if (e.key === 'collabspace-room') {
                try {
                    const data = JSON.parse(e.newValue);
                    this.handleSignaling(data);
                } catch(e) {}
            }
        });
    }
    
    createMeeting() {
        this.userName = document.getElementById('usernameInput').value || `User${Math.floor(Math.random()*1000)}`;
        this.userId = Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        this.currentRoom = 'room_' + Date.now().toString(36);
        
        document.getElementById('roomCodeInput').value = this.currentRoom;
        this.startLocalMedia();
        this.showSection(2);
        this.addNotification(' Meeting created! Room: ' + this.currentRoom);
    }
    
    joinMeeting() {
        this.userName = document.getElementById('usernameInput').value || `User${Math.floor(Math.random()*1000)}`;
        this.userId = Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        this.currentRoom = document.getElementById('roomCodeInput').value;
        
        if (!this.currentRoom) {
            alert('Please enter a room code');
            return;
        }
        this.startLocalMedia();
        this.showSection(2);
        this.broadcast({ type: 'join', userId: this.userId, userName: this.userName });
    }
    
    // SECTION 2: WEBRTC VIDEO/AUDIO ENGINE
    async startLocalMedia() {
        try {
            this.localStream = await navigator.mediaDevices.getUserMedia({
                video: { width: { ideal: 640 }, height: { ideal: 480 } },
                audio: true
            });
            this.renderLocalVideo();
        } catch(err) {
            console.error('Media access denied:', err);
            this.addNotification(' Camera/microphone access denied');
        }
    }
    
    renderLocalVideo() {
        const container = document.getElementById('videoContainer');
        container.innerHTML = `
            <div class="video-container">
                <video class="video-player" autoplay playsinline muted></video>
                <div class="video-overlay">
                    <div class="video-user">You (${this.userName})</div>
                    <div class="video-status"> Live</div>
                </div>
            </div>
        `;
        const video = container.querySelector('.video-player');
        video.srcObject = this.localStream;
    }
    
    // SECTION 3: MEDIA CONTROLS
    toggleVideo() {
        this.mediaState.video = !this.mediaState.video;
        if (this.localStream) {
            this.localStream.getVideoTracks()[0].enabled = this.mediaState.video;
        }
        document.getElementById('videoToggle').classList.toggle('active', this.mediaState.video);
    }
    
    toggleAudio() {
        this.mediaState.audio = !this.mediaState.audio;
        if (this.localStream) {
            this.localStream.getAudioTracks()[0].enabled = this.mediaState.audio;
        }
        document.getElementById('audioToggle').classList.toggle('active', this.mediaState.audio);
    }
    
    async toggleScreenShare() {
        try {
            if (this.mediaState.screen) {
                // Stop screen share, resume camera
                this.localStream.getTracks().forEach(track => track.stop());
                this.startLocalMedia();
                this.mediaState.screen = false;
            } else {
                // Start screen sharing
                const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                this.localStream = screenStream;
                this.renderLocalVideo();
                this.mediaState.screen = true;
            }
            document.getElementById('screenToggle').classList.toggle('active', this.mediaState.screen);
        } catch(err) {
            console.error('Screen sharing failed:', err);
        }
    }
    
    // SECTION 4: COLLABORATION TOOLS
    setupWhiteboard() {
        const canvas = document.getElementById('whiteboardCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 800;
        canvas.height = 400;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        
        let drawing = false;
        let lastPos = { x: 0, y: 0 };
        
        canvas.addEventListener('mousedown', (e) => {
            drawing = true;
            const rect = canvas.getBoundingClientRect();
            lastPos = { x: e.clientX - rect.left, y: e.clientY - rect.top };
        });
        
        canvas.addEventListener('mousemove', (e)
